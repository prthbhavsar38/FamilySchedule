<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FamilyScheduler">
<title>FamilyScheduler</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#007AFF;--red:#FF3B30;--green:#34C759;--orange:#FF9500;--purple:#AF52DE;
  --bg:#F2F2F7;--card:#FFFFFF;--border:#E5E5EA;--text:#1C1C1E;--sub:#8E8E93;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;color:var(--text);overflow:hidden}

/* Layout */
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative}
#header{padding:calc(16px + var(--safe-top)) 20px 12px;background:var(--card);border-bottom:0.5px solid var(--border);}
#header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
#header p{font-size:13px;color:var(--sub);margin-top:2px}
#content{flex:1;overflow-y:auto;padding:0 0 calc(80px + var(--safe-bot));-webkit-overflow-scrolling:touch}
#nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;padding-bottom:var(--safe-bot)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:none;cursor:pointer;color:var(--sub);font-size:10px;font-weight:500;transition:color .15s}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{width:24px;height:24px;stroke-width:1.8}

/* Views */
.view{display:none;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Section headings */
.sec-head{padding:20px 20px 8px;font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}

/* Cards */
.card{background:var(--card);border-radius:14px;margin:0 16px 10px;overflow:hidden;border:0.5px solid var(--border)}
.card-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border)}
.card-row:last-child{border-bottom:none}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.card-row-info{flex:1;min-width:0}
.card-row-info h3{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-row-info p{font-size:13px;color:var(--sub);margin-top:2px}
.badge-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.time-chip{font-size:14px;font-weight:600;color:var(--blue);flex-shrink:0;text-align:right}
.del-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--red);margin-left:4px;font-size:18px;line-height:1}

/* Empty state */
.empty{text-align:center;padding:48px 24px;color:var(--sub)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty p{font-size:14px;line-height:1.5}

/* Calendar */
#cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px}
#cal-header h2{font-size:20px;font-weight:700}
.cal-nav{background:var(--bg);border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--blue)}
#cal-grid{margin:0 16px;background:var(--card);border-radius:14px;overflow:hidden;border:0.5px solid var(--border)}
.cal-days-head{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 0 4px}
.cal-day-name{text-align:center;font-size:12px;font-weight:600;color:var(--sub)}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 4px 8px}
.cal-cell{display:flex;flex-direction:column;align-items:center;padding:4px 2px;cursor:pointer;border-radius:10px;transition:background .1s;min-height:44px;position:relative}
.cal-cell:hover{background:var(--bg)}
.cal-cell.today .cal-num{background:var(--blue);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.cal-cell.selected:not(.today) .cal-num{background:#E5EFFF;color:var(--blue);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.cal-cell.other-month{opacity:.3}
.cal-num{font-size:15px;font-weight:500;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.cal-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center}
.cal-dot{width:5px;height:5px;border-radius:50%}
#cal-day-events{margin:12px 16px 0}

/* FAB */
#fab{position:fixed;bottom:calc(90px + var(--safe-bot));right:20px;width:56px;height:56px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,122,255,.4);transition:transform .15s;z-index:100}
#fab:active{transform:scale(.93)}
#fab svg{stroke:#fff;stroke-width:2.5;width:28px;height:28px}

/* Modal */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#modal-overlay.open{display:flex;animation:slideUp .3s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
#modal{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding-bottom:calc(24px + var(--safe-bot))}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 4px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 16px}
.modal-head h2{font-size:20px;font-weight:700}
.modal-close{background:var(--border);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--sub)}
.form-group{margin:0 16px 12px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:16px;font-family:inherit;color:var(--text);outline:none;-webkit-appearance:none;appearance:none}
.form-group input:focus,.form-group select:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 12px}
.form-row .form-group{margin:0}

/* Family selector */
.member-grid{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0}
.member-chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;color:var(--text)}
.member-chip.selected{border-color:var(--blue);background:#E5EFFF;color:var(--blue)}
.member-chip .avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.add-member-row{display:flex;gap:8px;margin-top:8px}
.add-member-row input{flex:1;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none}
.add-member-row button{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}

/* Reminder options */
.reminder-opts{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0}
.rem-opt{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;font-weight:500;color:var(--text);transition:all .15s}
.rem-opt.selected{border-color:var(--orange);background:#FFF3E0;color:var(--orange)}

/* Color picker */
.color-opts{display:flex;gap:8px;padding:4px 0}
.col-opt{width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;border:3px solid transparent;transition:border .15s}
.col-opt.selected{border-color:var(--text)}
.col-opt span{width:22px;height:22px;border-radius:50%;display:block}

/* Submit */
#submit-btn{display:block;width:calc(100% - 32px);margin:16px 16px 0;background:var(--blue);color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity .15s}
#submit-btn:active{opacity:.8}

/* Notification banner */
#notif-banner{position:fixed;top:calc(16px + var(--safe-top));left:16px;right:16px;max-width:430px;margin:0 auto;background:var(--card);border-radius:14px;padding:14px 16px;border:0.5px solid var(--border);z-index:300;display:none;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
#notif-banner.show{display:flex;gap:12px;align-items:center}
#notif-banner .notif-icon{width:40px;height:40px;border-radius:10px;background:#E5EFFF;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
#notif-banner .notif-info h4{font-size:14px;font-weight:600}
#notif-banner .notif-info p{font-size:12px;color:var(--sub);margin-top:2px}
#notif-banner .notif-close{margin-left:auto;background:var(--bg);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--sub);display:flex;align-items:center;justify-content:center}

/* Family view */
.family-card{background:var(--card);border-radius:14px;margin:0 16px 10px;border:0.5px solid var(--border);overflow:hidden}
.family-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border)}
.family-row:last-child{border-bottom:none}
.fam-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.fam-info h3{font-size:16px;font-weight:500}
.fam-info p{font-size:12px;color:var(--sub);margin-top:1px}
.fam-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:20px;margin-left:auto;padding:4px}
.add-fam-card{background:var(--card);border-radius:14px;margin:0 16px 10px;border:0.5px solid var(--border);padding:16px}
.add-fam-card input{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;margin-bottom:10px}
.add-fam-card select{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;margin-bottom:10px;-webkit-appearance:none}
.add-fam-card button{width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer}

/* Notification permission */
#notif-prompt{background:linear-gradient(135deg,#007AFF15,#34C75915);border-radius:14px;margin:12px 16px;padding:16px;border:0.5px solid #007AFF30;display:flex;align-items:center;gap:12px}
#notif-prompt .np-icon{font-size:28px}
#notif-prompt .np-text h4{font-size:14px;font-weight:600}
#notif-prompt .np-text p{font-size:12px;color:var(--sub);margin-top:2px}
#notif-prompt button{margin-left:auto;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* Scrollbar */
::-webkit-scrollbar{width:0}

/* Stats strip */
.stats-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 16px}
.stat-box{background:var(--card);border-radius:14px;padding:14px;border:0.5px solid var(--border);text-align:center}
.stat-box .sv{font-size:24px;font-weight:700}
.stat-box .sl{font-size:11px;color:var(--sub);margin-top:2px;font-weight:500}

/* Install banner */
#install-banner{background:var(--card);margin:12px 16px;border-radius:14px;padding:14px 16px;border:0.5px solid var(--border);display:none;align-items:center;gap:10px}
#install-banner.show{display:flex}
#install-banner .ib-icon{font-size:26px}
#install-banner .ib-text p:first-child{font-size:14px;font-weight:600}
#install-banner .ib-text p:last-child{font-size:12px;color:var(--sub)}
#install-banner button{margin-left:auto;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <h1 id="view-title">Today</h1>
    <p id="view-sub"></p>
  </div>

  <!-- Notification permission prompt -->
  <div id="notif-banner">
    <div class="notif-icon">🔔</div>
    <div class="notif-info">
      <h4 id="nb-title">Reminder</h4>
      <p id="nb-body">Event starting soon</p>
    </div>
    <button class="notif-close" onclick="closeNotifBanner()">✕</button>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- HOME VIEW -->
    <div class="view active" id="view-home">
      <div id="notif-prompt" style="display:none">
        <div class="np-icon">🔔</div>
        <div class="np-text">
          <h4>Enable Reminders</h4>
          <p>Get notified when events are near</p>
        </div>
        <button onclick="requestNotifications()">Allow</button>
      </div>
      <div id="install-banner">
        <div class="ib-icon">📲</div>
        <div class="ib-text">
          <p>Add to Home Screen</p>
          <p>Works offline anytime</p>
        </div>
        <button id="install-btn">Install</button>
      </div>
      <div class="stats-strip" id="stats-strip"></div>
      <div class="sec-head">Today's Schedule</div>
      <div id="today-list"></div>
      <div class="sec-head">Upcoming</div>
      <div id="upcoming-list"></div>
    </div>

    <!-- CALENDAR VIEW -->
    <div class="view" id="view-calendar">
      <div id="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <h2 id="cal-month-label"></h2>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div id="cal-grid">
        <div class="cal-days-head">
          <div class="cal-day-name">Su</div>
          <div class="cal-day-name">Mo</div>
          <div class="cal-day-name">Tu</div>
          <div class="cal-day-name">We</div>
          <div class="cal-day-name">Th</div>
          <div class="cal-day-name">Fr</div>
          <div class="cal-day-name">Sa</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
      </div>
      <div id="cal-day-events"></div>
    </div>

    <!-- FAMILY VIEW -->
    <div class="view" id="view-family">
      <div class="add-fam-card" style="margin-top:12px">
        <input type="text" id="new-fam-name" placeholder="Family member name">
        <select id="new-fam-role">
          <option value="👨 Dad">👨 Dad</option>
          <option value="👩 Mom">👩 Mom</option>
          <option value="👦 Son">👦 Son</option>
          <option value="👧 Daughter">👧 Daughter</option>
          <option value="👴 Grandpa">👴 Grandpa</option>
          <option value="👵 Grandma">👵 Grandma</option>
          <option value="👨‍💼 Other">👨‍💼 Other</option>
        </select>
        <button onclick="addFamilyMember()">+ Add Member</button>
      </div>
      <div class="sec-head">Family Members</div>
      <div id="family-list"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav id="nav">
    <button class="nav-btn active" onclick="switchView('home',this)" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Today
    </button>
    <button class="nav-btn" onclick="switchView('calendar',this)" id="nav-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </button>
    <button class="nav-btn" onclick="switchView('family',this)" id="nav-family">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      Family
    </button>
  </nav>

  <!-- FAB -->
  <button id="fab" onclick="openModal()" aria-label="Add Schedule">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- Add Schedule Modal -->
  <div id="modal-overlay" onclick="handleOverlayClick(event)">
    <div id="modal">
      <div class="modal-handle"></div>
      <div class="modal-head">
        <h2>New Schedule</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="f-title" placeholder="e.g. Doctor appointment">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="time" id="f-time">
        </div>
      </div>

      <div class="form-group">
        <label>Color Label</label>
        <div class="color-opts" id="color-opts">
          <div class="col-opt selected" data-color="#007AFF" onclick="selectColor(this)"><span style="background:#007AFF"></span></div>
          <div class="col-opt" data-color="#FF3B30" onclick="selectColor(this)"><span style="background:#FF3B30"></span></div>
          <div class="col-opt" data-color="#34C759" onclick="selectColor(this)"><span style="background:#34C759"></span></div>
          <div class="col-opt" data-color="#FF9500" onclick="selectColor(this)"><span style="background:#FF9500"></span></div>
          <div class="col-opt" data-color="#AF52DE" onclick="selectColor(this)"><span style="background:#AF52DE"></span></div>
          <div class="col-opt" data-color="#FF2D55" onclick="selectColor(this)"><span style="background:#FF2D55"></span></div>
        </div>
      </div>

      <div class="form-group">
        <label>Remind Me</label>
        <div class="reminder-opts">
          <div class="rem-opt" data-min="0" onclick="selectReminder(this)">At time</div>
          <div class="rem-opt selected" data-min="5" onclick="selectReminder(this)">5 min</div>
          <div class="rem-opt" data-min="10" onclick="selectReminder(this)">10 min</div>
          <div class="rem-opt" data-min="15" onclick="selectReminder(this)">15 min</div>
          <div class="rem-opt" data-min="30" onclick="selectReminder(this)">30 min</div>
          <div class="rem-opt" data-min="60" onclick="selectReminder(this)">1 hour</div>
          <div class="rem-opt" data-min="1440" onclick="selectReminder(this)">1 day</div>
        </div>
      </div>

      <div class="form-group">
        <label>Notify Family</label>
        <div class="member-grid" id="modal-members"></div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="f-notes" rows="2" style="resize:none" placeholder="Optional notes…"></textarea>
      </div>

      <button id="submit-btn" onclick="saveSchedule()">Add to Calendar</button>
    </div>
  </div>

</div>

<script>
// ---- State ----
let schedules = JSON.parse(localStorage.getItem('schedules') || '[]');
let family = JSON.parse(localStorage.getItem('family') || JSON.stringify([
  {id:'f1',name:'Mom',role:'👩 Mom',color:'#FF2D55'},
  {id:'f2',name:'Dad',role:'👨 Dad',color:'#007AFF'},
  {id:'f3',name:'Me',role:'👦 Son',color:'#34C759'}
]));
let selectedColor = '#007AFF';
let selectedReminder = 5;
let selectedMembers = [];
let currentCalDate = new Date();
let selectedCalDay = null;
let reminderTimers = [];
let deferredPrompt = null;

// ---- Helpers ----
const fmt = d => new Date(d);
const todayStr = () => new Date().toISOString().split('T')[0];
const pad2 = n => String(n).padStart(2,'0');

function roleColor(role) {
  const m = {'👩 Mom':'#FF2D55','👨 Dad':'#007AFF','👦 Son':'#34C759','👧 Daughter':'#AF52DE','👴 Grandpa':'#FF9500','👵 Grandma':'#FF6B35','👨‍💼 Other':'#8E8E93'};
  return m[role] || '#007AFF';
}

function avatarInitials(name) {
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function timeLabel(t) {
  if(!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ampm = h>=12?'PM':'AM';
  return `${h%12||12}:${pad2(m)} ${ampm}`;
}

function formatDate(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function isToday(d) { return d === todayStr(); }

function save() {
  localStorage.setItem('schedules', JSON.stringify(schedules));
  localStorage.setItem('family', JSON.stringify(family));
}

// ---- Views ----
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  const titles = {home:'Today',calendar:'Calendar',family:'Family'};
  document.getElementById('view-title').textContent = titles[name];
  document.getElementById('view-sub').textContent = '';

  if(name==='home') renderHome();
  if(name==='calendar') renderCalendar();
  if(name==='family') renderFamily();
}

// ---- Home ----
function renderHome() {
  const today = todayStr();
  const todayEvents = schedules.filter(s=>s.date===today).sort((a,b)=>a.time.localeCompare(b.time));
  const upcoming = schedules.filter(s=>s.date>today).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).slice(0,5);

  // Stats
  const totalToday = todayEvents.length;
  const totalWeek = schedules.filter(s=>{const d=new Date(s.date);const n=new Date();const w=new Date();w.setDate(n.getDate()+7);return d>=n&&d<=w;}).length;
  document.getElementById('stats-strip').innerHTML = `
    <div class="stat-box"><div class="sv" style="color:var(--blue)">${totalToday}</div><div class="sl">Today</div></div>
    <div class="stat-box"><div class="sv" style="color:var(--orange)">${totalWeek}</div><div class="sl">This Week</div></div>
    <div class="stat-box"><div class="sv" style="color:var(--purple)">${family.length}</div><div class="sl">Members</div></div>
  `;

  // Today
  const todayEl = document.getElementById('today-list');
  if(todayEvents.length===0) {
    todayEl.innerHTML = `<div class="empty"><div class="empty-icon">☀️</div><h3>All clear today</h3><p>Tap + to add a schedule</p></div>`;
  } else {
    todayEl.innerHTML = `<div class="card">${todayEvents.map(s=>eventRow(s)).join('')}</div>`;
  }

  // Upcoming
  const upEl = document.getElementById('upcoming-list');
  if(upcoming.length===0) {
    upEl.innerHTML = `<div class="empty" style="padding:24px"><p>No upcoming events</p></div>`;
  } else {
    upEl.innerHTML = `<div class="card">${upcoming.map(s=>eventRow(s,true)).join('')}</div>`;
  }

  // Update sub
  document.getElementById('view-sub').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('view-title').textContent = 'Today';

  // Notification prompt
  const np = document.getElementById('notif-prompt');
  np.style.display = (Notification.permission==='default') ? 'flex' : 'none';
}

function eventRow(s, showDate=false) {
  const memberBadges = (s.members||[]).map(id=>{
    const m = family.find(f=>f.id===id);
    return m ? `<span class="badge" style="background:${m.color}20;color:${m.color}">${m.role.split(' ')[0]} ${m.name}</span>` : '';
  }).join('');

  return `<div class="card-row">
    <div class="dot" style="background:${s.color||'#007AFF'}"></div>
    <div class="card-row-info">
      <h3>${s.title}</h3>
      <p>${showDate ? formatDate(s.date)+' · ' : ''}${timeLabel(s.time)}${s.notes ? ' — '+s.notes.slice(0,30) : ''}</p>
      ${memberBadges ? `<div class="badge-row">${memberBadges}</div>` : ''}
    </div>
    <div class="time-chip">${timeLabel(s.time)}</div>
    <button class="del-btn" onclick="deleteSchedule('${s.id}')">×</button>
  </div>`;
}

function deleteSchedule(id) {
  if(confirm('Delete this schedule?')) {
    schedules = schedules.filter(s=>s.id!==id);
    save();
    renderHome();
    renderCalendar();
  }
}

// ---- Calendar ----
function renderCalendar() {
  const y = currentCalDate.getFullYear();
  const m = currentCalDate.getMonth();
  document.getElementById('cal-month-label').textContent = new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const daysInPrev = new Date(y,m,0).getDate();

  let cells = '';
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;

  // Prev month fill
  for(let i=firstDay-1;i>=0;i--) {
    cells += `<div class="cal-cell other-month"><div class="cal-num">${daysInPrev-i}</div></div>`;
  }

  for(let d=1;d<=daysInMonth;d++) {
    const key = `${y}-${pad2(m+1)}-${pad2(d)}`;
    const dayEvts = schedules.filter(s=>s.date===key);
    const isT = key===todayKey;
    const isSel = key===selectedCalDay;
    const dots = dayEvts.slice(0,3).map(s=>`<div class="cal-dot" style="background:${s.color||'#007AFF'}"></div>`).join('');

    cells += `<div class="cal-cell${isT?' today':''}${isSel&&!isT?' selected':''}" onclick="selectCalDay('${key}')">
      <div class="cal-num">${d}</div>
      ${dots ? `<div class="cal-dots">${dots}</div>` : ''}
    </div>`;
  }

  // Next month fill
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let d=1;d<=remaining;d++) {
    cells += `<div class="cal-cell other-month"><div class="cal-num">${d}</div></div>`;
  }

  document.getElementById('cal-days').innerHTML = cells;
  if(selectedCalDay) renderCalDayEvents(selectedCalDay);
}

function changeMonth(dir) {
  currentCalDate.setMonth(currentCalDate.getMonth()+dir);
  renderCalendar();
}

function selectCalDay(key) {
  selectedCalDay = key;
  renderCalendar();
  renderCalDayEvents(key);
}

function renderCalDayEvents(key) {
  const evts = schedules.filter(s=>s.date===key).sort((a,b)=>a.time.localeCompare(b.time));
  const el = document.getElementById('cal-day-events');
  if(evts.length===0) {
    el.innerHTML = `<div class="sec-head">${formatDate(key)}</div><div class="empty" style="padding:24px"><p>No events — tap + to add</p></div>`;
  } else {
    el.innerHTML = `<div class="sec-head">${formatDate(key)} · ${evts.length} event${evts.length>1?'s':''}</div><div class="card">${evts.map(s=>eventRow(s)).join('')}</div>`;
  }
}

// ---- Family ----
function renderFamily() {
  const el = document.getElementById('family-list');
  if(family.length===0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👨‍👩‍👧‍👦</div><h3>No members yet</h3><p>Add your family members above</p></div>`;
    return;
  }
  el.innerHTML = `<div class="family-card">${family.map(m=>`
    <div class="family-row">
      <div class="fam-avatar" style="background:${m.color||roleColor(m.role)}">${avatarInitials(m.name)}</div>
      <div class="fam-info">
        <h3>${m.name}</h3>
        <p>${m.role}</p>
      </div>
      <button class="fam-del" onclick="deleteMember('${m.id}')">×</button>
    </div>
  `).join('')}</div>`;
}

function addFamilyMember() {
  const name = document.getElementById('new-fam-name').value.trim();
  const role = document.getElementById('new-fam-role').value;
  if(!name) { document.getElementById('new-fam-name').focus(); return; }
  const id = 'f'+Date.now();
  family.push({id,name,role,color:roleColor(role)});
  save();
  document.getElementById('new-fam-name').value='';
  renderFamily();
  renderModalMembers();
}

function deleteMember(id) {
  family = family.filter(f=>f.id!==id);
  save();
  renderFamily();
}

// ---- Modal ----
function openModal() {
  const d = new Date();
  document.getElementById('f-date').value = todayStr();
  document.getElementById('f-time').value = `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  document.getElementById('f-title').value = '';
  document.getElementById('f-notes').value = '';
  selectedColor = '#007AFF';
  selectedReminder = 5;
  selectedMembers = [];
  document.querySelectorAll('.col-opt').forEach(o=>o.classList.toggle('selected',o.dataset.color==='#007AFF'));
  document.querySelectorAll('.rem-opt').forEach(o=>o.classList.toggle('selected',o.dataset.min==='5'));
  renderModalMembers();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),300);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}

function renderModalMembers() {
  document.getElementById('modal-members').innerHTML = family.map(m=>`
    <div class="member-chip${selectedMembers.includes(m.id)?' selected':''}" onclick="toggleMember('${m.id}',this)">
      <div class="avatar" style="background:${m.color}">${avatarInitials(m.name)}</div>
      ${m.name}
    </div>
  `).join('');
}

function toggleMember(id, el) {
  if(selectedMembers.includes(id)) {
    selectedMembers = selectedMembers.filter(x=>x!==id);
    el.classList.remove('selected');
  } else {
    selectedMembers.push(id);
    el.classList.add('selected');
  }
}

function selectColor(el) {
  document.querySelectorAll('.col-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = el.dataset.color;
}

function selectReminder(el) {
  document.querySelectorAll('.rem-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  selectedReminder = parseInt(el.dataset.min);
}

function saveSchedule() {
  const title = document.getElementById('f-title').value.trim();
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  if(!title) { document.getElementById('f-title').style.borderColor='var(--red)'; document.getElementById('f-title').focus(); return; }
  if(!date || !time) { alert('Please set a date and time'); return; }

  const id = 's'+Date.now();
  const s = {id,title,date,time,color:selectedColor,remindBefore:selectedReminder,members:[...selectedMembers],notes:document.getElementById('f-notes').value.trim(),created:Date.now()};
  schedules.push(s);
  save();
  scheduleReminder(s);
  closeModal();

  // Refresh current view
  const active = document.querySelector('.view.active').id;
  if(active==='view-home') renderHome();
  if(active==='view-calendar') { selectedCalDay=date; renderCalendar(); }

  showNotifBanner('✅ Added!', `"${title}" on ${formatDate(date)} at ${timeLabel(time)}`);
}

// ---- Reminders ----
function scheduleReminder(s) {
  if(Notification.permission!=='granted') return;
  const eventTime = new Date(`${s.date}T${s.time}`).getTime();
  const remindAt = eventTime - (s.remindBefore * 60000);
  const delay = remindAt - Date.now();
  if(delay <= 0) return;

  const timer = setTimeout(()=>{
    const memberNames = (s.members||[]).map(id=>{const m=family.find(f=>f.id===id);return m?m.name:'';}).filter(Boolean).join(', ');
    const body = memberNames ? `${timeLabel(s.time)} · ${memberNames}` : timeLabel(s.time);

    if('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({type:'notify',title:s.title,body});
    } else {
      new Notification(s.title, {body, icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">📅</text></svg>'});
    }
    showNotifBanner('🔔 '+s.title, body);
  }, delay);
  reminderTimers.push(timer);
}

function scheduleAllReminders() {
  reminderTimers.forEach(t=>clearTimeout(t));
  reminderTimers = [];
  const now = Date.now();
  schedules.forEach(s=>{
    const eventTime = new Date(`${s.date}T${s.time}`).getTime();
    if(eventTime > now) scheduleReminder(s);
  });
}

function requestNotifications() {
  Notification.requestPermission().then(p=>{
    document.getElementById('notif-prompt').style.display='none';
    if(p==='granted') {
      scheduleAllReminders();
      showNotifBanner('🔔 Reminders On','You\'ll be notified before each event');
    }
  });
}

function showNotifBanner(title, body) {
  document.getElementById('nb-title').textContent = title;
  document.getElementById('nb-body').textContent = body;
  const b = document.getElementById('notif-banner');
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'), 4000);
}

function closeNotifBanner() {
  document.getElementById('notif-banner').classList.remove('show');
}

// ---- PWA Install ----
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});

// ---- Service Worker ----
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ---- Init ----
renderHome();
if(Notification.permission==='granted') scheduleAllReminders();
selectedCalDay = todayStr();
</script>
</body>
</html>
